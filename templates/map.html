<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Map — Formating AI Assistance</title>
    <meta name="description"
        content="Interactive GIS map for Gilgit-Baltistan Energy Master Plan — visualize hydropower, solar, wind, and grid infrastructure.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --green-haze: #009959;
            --green-dark: #007a47;
            --green-light: #00b86b;
            --green-glow: rgba(0, 153, 89, 0.3);
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #1f2b3d;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(0, 153, 89, 0.4);
            --danger: #ef4444;
            --radius: 16px;
            --radius-sm: 10px;
            --sidebar-width: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--green-haze), var(--green-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px var(--green-glow);
            flex-shrink: 0;
        }

        .sidebar-logo svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .sidebar-brand h1 {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
        }

        .sidebar-brand p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            background: transparent;
        }

        .nav-link:hover {
            border-color: var(--green-haze);
            color: var(--green-haze);
        }

        .nav-link.active {
            background: var(--green-haze);
            border-color: var(--green-haze);
            color: white;
        }

        /* ─── Sidebar body ─── */
        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .sidebar-body::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-top: 20px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Layer toggles */
        .layer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .layer-item:hover {
            background: var(--bg-card);
        }

        .layer-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .layer-info {
            flex: 1;
            min-width: 0;
        }

        .layer-name {
            font-size: 13px;
            font-weight: 500;
        }

        .layer-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .layer-toggle {
            position: relative;
            width: 38px;
            height: 20px;
            flex-shrink: 0;
        }

        .layer-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            border-radius: 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .layer-toggle input:checked+.toggle-slider {
            background: var(--green-haze);
            border-color: var(--green-haze);
        }

        .layer-toggle input:checked+.toggle-slider::before {
            transform: translateX(18px);
            background: white;
        }

        /* Upload GeoJSON */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--green-haze);
            background: rgba(0, 153, 89, 0.05);
        }

        .upload-zone i {
            font-size: 20px;
            color: var(--green-haze);
            margin-bottom: 8px;
            display: block;
        }

        .upload-zone p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .upload-zone input {
            display: none;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--green-haze);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .btn-export {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--green-haze), var(--green-dark));
            color: white;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-export:hover {
            box-shadow: 0 8px 24px var(--green-glow);
            transform: translateY(-1px);
        }

        /* ─── Map Container ─── */
        .map-container {
            flex: 1;
            position: relative;
            height: 100vh;
        }

        #mapFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .map-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 500;
            transition: opacity 0.5s;
        }

        .map-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .map-loading .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--green-haze);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .map-loading p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Mobile sidebar toggle */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1100;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-primary);
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(-100%);
                z-index: 1500;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: flex;
            }

            .map-container {
                width: 100vw;
            }
        }
    </style>
</head>

<body>
    <!-- Mobile toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" fill="none" stroke="white"
                            stroke-width="2" />
                        <circle cx="12" cy="10" r="3" fill="none" stroke="white" stroke-width="2" />
                    </svg>
                </div>
                <div>
                    <h1>GIS Map</h1>
                    <p>Energy Master Plan — Gilgit-Baltistan</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">📄 Formatter</a>
                <a href="/map" class="nav-link active">🗺️ GIS Map</a>
            </div>
        </div>

        <div class="sidebar-body">
            <!-- Stats -->
            <div class="section-title">Overview</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalFeatures">0</div>
                    <div class="stat-label">Features</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalLayers">0</div>
                    <div class="stat-label">Layers</div>
                </div>
            </div>

            <!-- Layers -->
            <div class="section-title">Energy Layers</div>
            <div id="layerList"></div>

            <!-- Upload -->
            <div class="section-title">Import Data</div>
            <div class="upload-zone" id="uploadZone">
                <i class="fa fa-upload"></i>
                <p>Drop GIS data file or click to browse</p>
                <p style="font-size:10px;color:var(--text-muted);margin-top:4px">.geojson · .kml · .kmz · .zip
                    (Shapefile) · .csv · .gpx</p>
                <input type="file" id="geojsonInput" accept=".geojson,.json,.kml,.kmz,.zip,.csv,.gpx">
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="btn-export" id="exportBtn">
                <i class="fa fa-download"></i>
                Export Map as HTML
            </button>
        </div>
    </aside>

    <!-- Map -->
    <main class="map-container">
        <div class="map-loading" id="mapLoading">
            <div class="spinner"></div>
            <p>Generating map for Gilgit-Baltistan…</p>
        </div>
        <iframe id="mapFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ─── State ───
        const state = {
            layers: {},
            stats: { features: 0, layers: 0 },
        };

        // ─── Elements ───
        const mapFrame = document.getElementById('mapFrame');
        const mapLoading = document.getElementById('mapLoading');
        const layerList = document.getElementById('layerList');
        const totalFeatures = document.getElementById('totalFeatures');
        const totalLayers = document.getElementById('totalLayers');
        const uploadZone = document.getElementById('uploadZone');
        const geojsonInput = document.getElementById('geojsonInput');
        const exportBtn = document.getElementById('exportBtn');
        const toast = document.getElementById('toast');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        // ─── Layer config (matches backend) ───
        const LAYER_CONFIG = {
            hydropower: { name: 'Hydropower Plants', color: '#2196F3', icon: 'fa-tint', default: true },
            solar: { name: 'Solar Potential Zones', color: '#FFC107', icon: 'fa-sun-o', default: true },
            wind: { name: 'Wind Corridors', color: '#E91E63', icon: 'fa-flag', default: true },
            grid: { name: 'Transmission Grid', color: '#FF5722', icon: 'fa-bolt', default: false },
            boundaries: { name: 'District Boundaries', color: '#78909C', icon: 'fa-map', default: false },
        };

        // ─── Init ───
        async function init() {
            buildLayerToggles();
            await loadMap();
        }

        function buildLayerToggles() {
            let html = '';
            for (const [key, cfg] of Object.entries(LAYER_CONFIG)) {
                state.layers[key] = cfg.default;
                html += `
                    <div class="layer-item" onclick="toggleLayer('${key}')">
                        <div class="layer-dot" style="color:${cfg.color}; background:${cfg.color}"></div>
                        <div class="layer-info">
                            <div class="layer-name">${cfg.name}</div>
                        </div>
                        <label class="layer-toggle" onclick="event.stopPropagation()">
                            <input type="checkbox" id="layer_${key}" ${cfg.default ? 'checked' : ''} onchange="toggleLayer('${key}')">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                `;
            }
            layerList.innerHTML = html;
        }

        async function toggleLayer(key) {
            const checkbox = document.getElementById(`layer_${key}`);
            // If called from the outer div, flip checkbox manually
            if (checkbox && document.activeElement !== checkbox) {
                checkbox.checked = !checkbox.checked;
            }
            state.layers[key] = checkbox.checked;
            await loadMap();
        }

        async function loadMap() {
            mapLoading.classList.remove('hidden');

            const activeLayers = Object.entries(state.layers)
                .filter(([_, on]) => on)
                .map(([k]) => k);

            try {
                const res = await fetch('/api/map', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ layers: activeLayers }),
                });
                const data = await res.json();

                if (data.error) {
                    showToast('❌ ' + data.error);
                    return;
                }

                // Render map in iframe
                mapFrame.srcdoc = data.map_html;
                totalFeatures.textContent = data.total_features || 0;
                totalLayers.textContent = activeLayers.length;

                mapFrame.onload = () => {
                    mapLoading.classList.add('hidden');
                };
            } catch (err) {
                showToast('❌ Failed to load map');
                mapLoading.classList.add('hidden');
            }
        }

        // ─── Upload GeoJSON ───
        uploadZone.addEventListener('click', () => geojsonInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) uploadGeoJSON(e.dataTransfer.files[0]);
        });

        geojsonInput.addEventListener('change', () => {
            if (geojsonInput.files.length > 0) uploadGeoJSON(geojsonInput.files[0]);
        });

        async function uploadGeoJSON(file) {
            if (!file.name.match(/\.(geojson|json|kml|kmz|zip|csv|gpx)$/i)) {
                showToast('⚠️ Supported: .geojson, .kml, .kmz, .zip, .csv, .gpx');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/map/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    showToast('❌ ' + data.error);
                    return;
                }

                showToast(`✅ Loaded ${data.features_count} features from ${file.name} (${data.format || 'GeoJSON'})`);
                await loadMap();
            } catch (err) {
                showToast('❌ Upload failed');
            }
        }

        // ─── Export ───
        exportBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/map/export');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'gb_energy_map.html';
                a.click();
                URL.revokeObjectURL(url);
                showToast('✅ Map exported successfully');
            } catch (err) {
                showToast('❌ Export failed');
            }
        });

        // ─── Mobile sidebar ───
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // ─── Toast ───
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ─── Go ───
        init();
    </script>
</body>

</html>
